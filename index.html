<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persomaid — 出会いを、キャラクターに。</title>
    <meta name="description" content="ゲームのキャラメイク感覚で、あなたの出会いを詳細に記録。すべてのデータはデバイス内に、完全プライベートで。" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA fallback: 404.html で保存されたURLを復元する
      (function () {
        var redirect = sessionStorage.getItem("spa_redirect")
        if (redirect) {
          sessionStorage.removeItem("spa_redirect")
          history.replaceState(null, "", redirect)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
